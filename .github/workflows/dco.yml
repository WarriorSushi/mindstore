name: DCO

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feat/**"
      - "fix/**"

jobs:
  dco:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Developer Certificate of Origin sign-offs
        run: |
          git log --format="%H %s" origin/main..HEAD | while read hash subject; do
            body=$(git log -1 --format="%B" "$hash")
            if echo "$body" | grep -qiE "^Signed-off-by:|^Co-Authored-By:"; then
              echo "✓ $hash: $subject"
            else
              echo "✗ $hash missing sign-off: $subject"
              # Non-blocking for now — warn only
            fi
          done
          echo "DCO check complete"
